<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 Stock Price Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .stock-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: #667eea;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .prediction {
            text-align: center;
            padding: 20px;
        }

        .stock-name {
            font-size: 2em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .price-container {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .price-box {
            flex: 1;
            min-width: 200px;
            padding: 20px;
            border-radius: 15px;
            background: #f7f7f7;
        }

        .price-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }

        .change {
            font-size: 1.8em;
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
        }

        .positive {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .negative {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #667eea;
            font-size: 1.5em;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .history {
            margin-top: 20px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            padding: 15px;
            background: #f7f7f7;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            font-size: 0.9em;
        }

        .footer a {
            color: white;
            text-decoration: underline;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .price-container {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Stock Price Predictor</h1>
        <div class="subtitle">AI-Powered Stock Market Predictions</div>
        
        <div class="card">
            <div class="stock-selector">
                <button onclick="loadPrediction('AAPL')">🍎 Apple (AAPL)</button>
                <button onclick="loadPrediction('GOOGL')">🔍 Google (GOOGL)</button>
                <button onclick="loadPrediction('MSFT')">💻 Microsoft (MSFT)</button>
            </div>
        </div>

        <div id="error" class="error" style="display:none;"></div>

        <div id="result" class="card" style="display:none;">
            <div class="prediction">
                <div class="stock-name" id="symbol">AAPL</div>
                
                <div class="price-container">
                    <div class="price-box">
                        <div class="price-label">Current Price</div>
                        <div class="price" id="current">$0.00</div>
                    </div>
                    
                    <div class="price-box">
                        <div class="price-label">Predicted Tomorrow</div>
                        <div class="price" id="predicted">$0.00</div>
                    </div>
                </div>

                <div class="change" id="change">+0.00%</div>

                <div class="stats-grid" id="stats"></div>
            </div>
        </div>

        <div id="loading" class="card loading" style="display:none;">
            <div class="spinner"></div>
            <div>Loading prediction...</div>
        </div>

        <div class="footer">
            <p>Built with Python, Flask, and Machine Learning</p>
            <p><a href="https://github.com/yourusername/ml-stock-predictor" target="_blank">View on GitHub</a></p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';

        async function loadPrediction(symbol) {
            // Hide error
            document.getElementById('error').style.display = 'none';
            
            // Show loading
            document.getElementById('result').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                // Get prediction
                const predResponse = await fetch(`${API_URL}/api/predict/${symbol}`);
                if (!predResponse.ok) throw new Error('Failed to get prediction');
                const predData = await predResponse.json();

                // Get history
                const histResponse = await fetch(`${API_URL}/api/history/${symbol}?days=10`);
                const histData = await histResponse.json();

                // Update UI
                document.getElementById('symbol').textContent = predData.symbol;
                document.getElementById('current').textContent = `$${predData.current_price}`;
                document.getElementById('predicted').textContent = `$${predData.predicted_price}`;
                
                const changeElem = document.getElementById('change');
                const change = predData.change_percent;
                const direction = change > 0 ? '📈 ' : '📉 ';
                changeElem.textContent = `${direction}${change > 0 ? '+' : ''}${change}%`;
                changeElem.className = change > 0 ? 'change positive' : 'change negative';

                // Update stats
                const stats = histData.statistics;
                document.getElementById('stats').innerHTML = `
                    <div class="stat-box">
                        <div class="stat-label">Average (10d)</div>
                        <div class="stat-value">$${stats.average}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">High (10d)</div>
                        <div class="stat-value">$${stats.high}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Low (10d)</div>
                        <div class="stat-value">$${stats.low}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Direction</div>
                        <div class="stat-value">${predData.direction.toUpperCase()}</div>
                    </div>
                `;

                // Show result
                document.getElementById('loading').style.display = 'none';
                document.getElementById('result').style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                
                const errorElem = document.getElementById('error');
                errorElem.textContent = '⚠️ Error: Make sure the API server is running! (python api/app.py)';
                errorElem.style.display = 'block';
            }
        }

        // Load AAPL by default
        window.addEventListener('load', () => {
            loadPrediction('AAPL');
        });
    </script>
</body>
</html>
